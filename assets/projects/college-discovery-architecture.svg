<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#9d5bf5"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="560" fill="#0d1117"/>

  <!-- Browser -->
  <rect x="370" y="24" width="260" height="56" rx="10" fill="#131a24" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="500" y="58" fill="#e8eaf0" font-family="monospace" font-size="17" text-anchor="middle" font-weight="600">Browser</text>

  <line x1="500" y1="80" x2="500" y2="112" stroke="url(#edge)" stroke-width="2"/>
  <polygon points="500,118 494,106 506,106" fill="#9d5bf5"/>

  <!-- App Router -->
  <rect x="300" y="122" width="400" height="60" rx="10" fill="#131a24" stroke="#9d5bf5" stroke-width="1.5"/>
  <text x="500" y="149" fill="#e8eaf0" font-family="monospace" font-size="15" text-anchor="middle" font-weight="600">Next.js App Router</text>
  <text x="500" y="169" fill="#9ba3b5" font-family="monospace" font-size="11.5" text-anchor="middle">Pages &amp; Client Components</text>

  <line x1="500" y1="182" x2="500" y2="214" stroke="url(#edge)" stroke-width="2"/>
  <polygon points="500,220 494,208 506,208" fill="#9d5bf5"/>

  <!-- Middleware -->
  <rect x="330" y="224" width="340" height="56" rx="10" fill="#131a24" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="500" y="250" fill="#e8eaf0" font-family="monospace" font-size="14.5" text-anchor="middle" font-weight="600">middleware.ts</text>
  <text x="500" y="269" fill="#9ba3b5" font-family="monospace" font-size="11.5" text-anchor="middle">JWT cookie auth · access control</text>

  <line x1="500" y1="280" x2="500" y2="312" stroke="url(#edge)" stroke-width="2"/>
  <polygon points="500,318 494,306 506,306" fill="#00d4ff"/>

  <!-- API route handlers -->
  <rect x="280" y="322" width="440" height="60" rx="10" fill="#131a24" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="500" y="349" fill="#e8eaf0" font-family="monospace" font-size="15" text-anchor="middle" font-weight="600">API Route Handlers</text>
  <text x="500" y="369" fill="#9ba3b5" font-family="monospace" font-size="11.5" text-anchor="middle">Zod-validated · auth, colleges, compare, recommend, ai</text>

  <!-- three branches -->
  <line x1="500" y1="382" x2="500" y2="404" stroke="#9d5bf5" stroke-width="2"/>
  <line x1="180" y1="404" x2="820" y2="404" stroke="#9d5bf5" stroke-width="2"/>
  <line x1="180" y1="404" x2="180" y2="430" stroke="#9d5bf5" stroke-width="2"/>
  <line x1="500" y1="404" x2="500" y2="430" stroke="#9d5bf5" stroke-width="2"/>
  <line x1="820" y1="404" x2="820" y2="430" stroke="#9d5bf5" stroke-width="2"/>

  <!-- Prisma -->
  <rect x="60" y="434" width="240" height="56" rx="10" fill="#131a24" stroke="#00ff88" stroke-width="1.5"/>
  <text x="180" y="459" fill="#e8eaf0" font-family="monospace" font-size="14" text-anchor="middle" font-weight="600">Prisma Client</text>
  <text x="180" y="477" fill="#9ba3b5" font-family="monospace" font-size="11" text-anchor="middle">→ PostgreSQL</text>

  <!-- Resend -->
  <rect x="380" y="434" width="240" height="56" rx="10" fill="#131a24" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="500" y="459" fill="#e8eaf0" font-family="monospace" font-size="14" text-anchor="middle" font-weight="600">Resend</text>
  <text x="500" y="477" fill="#9ba3b5" font-family="monospace" font-size="11" text-anchor="middle">→ Password reset email</text>

  <!-- Groq -->
  <rect x="700" y="434" width="240" height="56" rx="10" fill="#131a24" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="820" y="459" fill="#e8eaf0" font-family="monospace" font-size="14" text-anchor="middle" font-weight="600">Groq API</text>
  <text x="820" y="477" fill="#9ba3b5" font-family="monospace" font-size="11" text-anchor="middle">→ AI guidance (server-proxied)</text>

  <text x="500" y="530" fill="#5a6273" font-family="monospace" font-size="12" text-anchor="middle">College Discovery — System Architecture · Next.js monolith, PostgreSQL, Prisma ORM</text>
</svg>
